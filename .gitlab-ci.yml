stages:
  - test

variables:
  CI: 'true'

unit_tests:
  stage: test
  image: node:20
  script:
    - node --version
    - npm --version
    - npm ci
    - npm test

mutation_tests:
  stage: test
  image: node:20
  script:
    - node --version
    - npm --version
    - npm ci
    - npm run test:mutation
  artifacts:
    when: always
    paths:
      - reports/mutation/

e2e_tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.47.2-jammy
  script:
    - node --version
    - npm --version
    - npm ci
    - npx playwright install
    - npm run e2e
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
      - results.xml
    reports:
      junit: results.xml
