stages:
  - test

variables:
  CI: 'true'

e2e_tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.47.2-jammy
  script:
    - node --version
    - npm --version
    - npm install -g yarn
    - yarn
    - yarn playwright install
    - yarn e2e
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
      - results.xml
    reports:
      junit: results.xml
